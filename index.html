<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>การเดินทางมา JJ Mall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }
    .gallery {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .gallery::-webkit-scrollbar { display: none; }
    .slide {
      min-width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      color: white;
      padding: 40px 20px 30px;
    }
    .caption .step-num {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    .caption .step-text {
      font-size: 17px;
      font-weight: bold;
    }
    .dots {
      position: fixed;
      bottom: 12px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.3s;
    }
    .dot.active { background: white; }
  </style>
</head>
<body>
  <div class="gallery" id="gallery">
    <div class="slide">
      <img src="step1.jpg" alt="ขั้นตอนที่ 1">
      <div class="caption">
        <div class="step-num">ขั้นตอนที่ 1 / 4</div>
        <div class="step-text">คำอธิบายขั้นตอนที่ 1</div>
      </div>
    </div>
    <div class="slide">
      <img src="step2.jpg" alt="ขั้นตอนที่ 2">
      <div class="caption">
        <div class="step-num">ขั้นตอนที่ 2 / 4</div>
        <div class="step-text">คำอธิบายขั้นตอนที่ 2</div>
      </div>
    </div>
    <div class="slide">
      <img src="step3.jpg" alt="ขั้นตอนที่ 3">
      <div class="caption">
        <div class="step-num">ขั้นตอนที่ 3 / 4</div>
        <div class="step-text">คำอธิบายขั้นตอนที่ 3</div>
      </div>
    </div>
    <div class="slide">
      <img src="step4.jpg" alt="ขั้นตอนที่ 4">
      <div class="caption">
        <div class="step-num">ขั้นตอนที่ 4 / 4</div>
        <div class="step-text">คำอธิบายขั้นตอนที่ 4</div>
      </div>
    </div>
  </div>

  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const dots = document.querySelectorAll('.dot');
    gallery.addEventListener('scroll', () => {
      const index = Math.round(gallery.scrollLeft / window.innerWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === index));
    });
  </script>
</body>
</html>
